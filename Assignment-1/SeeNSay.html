<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>See'N'Say Story Teller | COMP1073 Client-Side JavaScript</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link href="css/normalize.css" rel="stylesheet" />
	<link href="css/styles.css?v=2" rel="stylesheet" />
	<script src="js/SeeNSay.js?v=2" defer></script>
</head>

<body>
	<h1>See'N'Say Story Teller</h1>
	<p>
        The See'N'Say Story Teller is a fun and interactive web application that allows users to create and listen to their own stories. 
    </p>

    <p>
         By clicking on the buttons, you can select different story elements and build silly stories.
	</p>

    <!-- Selection Preview Box -->
     <div id = "selection">
        <h2>Your Selections:</h2>
        <p id="selection1"></p>
        <p id="selection2"></p>
        <p id="selection3"></p>
        <p id="selection4"></p>
        <p id="selection5"></p>
     </div>

	<!-- Story Builder Buttons -->
	<button>1</button>
	<button>2</button>
	<button>3</button>
	<button>4</button>
	<button>5</button>

    <!-- Action Buttons-->
	<button>PlayBack</button>
	<!-- <button>Surprise</button> -->
    <button>Reset</button>
    <!--<audio id="audio" src="audio/1.mp3"></audio> (auto generated) look up on MDN-->

</body>
</html>
